<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♌ Leo Lion Particle — Duong Thai Tan</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #050505; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #FFD700; font-family: Georgia, serif; font-size: 0.75rem;
    letter-spacing: 4px; opacity: 0.5;
  }
</style>
</head>
<body>
<div id="info">♌ LEO PARTICLE SYSTEM</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 40;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.1
);
composer.addPass(bloom);

// Lion silhouette points (simplified lion head profile)
const lionPoints = [];
// Mane (outer circle)
for (let i = 0; i < 120; i++) {
  const angle = (i / 120) * Math.PI * 2;
  const r = 10 + Math.sin(angle * 8) * 1.5 + Math.cos(angle * 5) * 1;
  lionPoints.push(new THREE.Vector3(Math.cos(angle) * r, Math.sin(angle) * r + 2, 0));
}
// Face features
// Eyes
for (let i = 0; i < 20; i++) {
  const angle = (i / 20) * Math.PI * 2;
  lionPoints.push(new THREE.Vector3(-3 + Math.cos(angle) * 1.2, 4 + Math.sin(angle) * 0.8, 0));
  lionPoints.push(new THREE.Vector3(3 + Math.cos(angle) * 1.2, 4 + Math.sin(angle) * 0.8, 0));
}
// Nose
for (let i = 0; i < 15; i++) {
  const angle = (i / 15) * Math.PI * 2;
  lionPoints.push(new THREE.Vector3(Math.cos(angle) * 1.5, 1 + Math.sin(angle) * 1, 0));
}
// Mouth
for (let i = 0; i < 20; i++) {
  const t = i / 20;
  lionPoints.push(new THREE.Vector3(-3 + t * 6, -1 - Math.sin(t * Math.PI) * 1.5, 0));
}
// Inner mane details
for (let i = 0; i < 60; i++) {
  const angle = (i / 60) * Math.PI * 2;
  const r = 7 + Math.sin(angle * 6) * 0.8;
  lionPoints.push(new THREE.Vector3(Math.cos(angle) * r, Math.sin(angle) * r + 2, 0));
}
// Crown (Leo is king)
const crownPts = [
  [-4, 13], [-3, 16], [-1.5, 14], [0, 17], [1.5, 14], [3, 16], [4, 13]
];
for (let i = 0; i < crownPts.length - 1; i++) {
  for (let t = 0; t < 10; t++) {
    const f = t / 10;
    lionPoints.push(new THREE.Vector3(
      crownPts[i][0] + (crownPts[i+1][0] - crownPts[i][0]) * f,
      crownPts[i][1] + (crownPts[i+1][1] - crownPts[i][1]) * f,
      0
    ));
  }
}

// Create particle system
const particleCount = 4000;
const positions = new Float32Array(particleCount * 3);
const targets = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
const randoms = new Float32Array(particleCount);

const goldColors = [
  new THREE.Color(0xFFD700),
  new THREE.Color(0xFFA500),
  new THREE.Color(0xFF8C00),
  new THREE.Color(0xFFB347),
  new THREE.Color(0xFFE4B5)
];

for (let i = 0; i < particleCount; i++) {
  // Start scattered
  positions[i*3] = (Math.random() - 0.5) * 60;
  positions[i*3+1] = (Math.random() - 0.5) * 60;
  positions[i*3+2] = (Math.random() - 0.5) * 20;
  
  // Target: lion shape
  const pt = lionPoints[i % lionPoints.length];
  targets[i*3] = pt.x + (Math.random() - 0.5) * 0.8;
  targets[i*3+1] = pt.y + (Math.random() - 0.5) * 0.8;
  targets[i*3+2] = (Math.random() - 0.5) * 2;
  
  const c = goldColors[Math.floor(Math.random() * goldColors.length)];
  colors[i*3] = c.r;
  colors[i*3+1] = c.g;
  colors[i*3+2] = c.b;
  
  sizes[i] = Math.random() * 2 + 0.5;
  randoms[i] = Math.random() * Math.PI * 2;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const mat = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    attribute float size;
    varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      float alpha = 1.0 - smoothstep(0.0, 1.0, d);
      gl_FragColor = vec4(vColor, alpha * 0.8);
    }
  `,
  transparent: true,
  vertexColors: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// Background stars
const bgCount = 1500;
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(bgCount * 3);
for (let i = 0; i < bgCount; i++) {
  bgPos[i*3] = (Math.random() - 0.5) * 200;
  bgPos[i*3+1] = (Math.random() - 0.5) * 200;
  bgPos[i*3+2] = -50 - Math.random() * 100;
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
const bgMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.3, transparent: true, opacity: 0.4
});
scene.add(new THREE.Points(bgGeo, bgMat));

let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
let morphProgress = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  mat.uniforms.time.value = t;
  
  // Morph particles toward lion shape
  morphProgress = Math.min(morphProgress + 0.003, 1.0);
  const ease = morphProgress * morphProgress * (3 - 2 * morphProgress); // smoothstep
  
  const pos = geo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    // Lerp to target
    pos[i3] += (targets[i3] - pos[i3]) * 0.02;
    pos[i3+1] += (targets[i3+1] - pos[i3+1]) * 0.02;
    pos[i3+2] += (targets[i3+2] - pos[i3+2]) * 0.02;
    
    // Add slight breathing
    if (ease > 0.8) {
      const breathe = Math.sin(t * 1.5 + randoms[i]) * 0.15;
      pos[i3] += Math.cos(randoms[i]) * breathe;
      pos[i3+1] += Math.sin(randoms[i]) * breathe;
    }
  }
  geo.attributes.position.needsUpdate = true;
  
  // Slow rotation
  particles.rotation.y = Math.sin(t * 0.2) * 0.15;
  
  // Camera follow
  camera.position.x += (mouseX * 5 - camera.position.x) * 0.02;
  camera.position.y += (-mouseY * 3 - camera.position.y) * 0.02;
  camera.lookAt(0, 2, 0);
  
  composer.render();
}

animate();
</script>
</body>
</html>
