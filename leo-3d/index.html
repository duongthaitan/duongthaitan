<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>♌ 3D Lion King — Duong Thai Tan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0605}
canvas{display:block}
#overlay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#FFD700;font-size:.7rem;letter-spacing:4px;opacity:.4;pointer-events:none;font-family:Georgia,serif}
#title{position:fixed;top:30px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:10;font-family:Georgia,serif}
#title h1{font-size:clamp(1.5rem,4vw,3rem);background:linear-gradient(135deg,#FFD700,#FF8C00,#FFD700);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gs 3s ease infinite;letter-spacing:3px}
#title p{color:#FFA500;opacity:.6;font-size:.8rem;letter-spacing:5px;margin-top:5px}
@keyframes gs{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
</style>
</head>
<body>
<div id="title"><h1>♌ DUONG THAI TAN</h1><p>LEO • FRONTEND DEVELOPER • VIETNAM 🇻🇳</p></div>
<div id="overlay">♌ MOVE MOUSE TO INTERACT</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
import*as THREE from'three';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,500);
camera.position.set(0,0,5);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.5,0.4,0.85);
bloom.threshold=0.5;bloom.strength=0.8;bloom.radius=0.4;
composer.addPass(bloom);

// Load the photorealistic lion image as a texture on a plane with depth effect
const texLoader=new THREE.TextureLoader();
const lionTex=texLoader.load('../assets/golden-lion.png',()=>{
  // Lion plane (billboard)
  const aspect=1; // square image
  const planeW=3.5;
  const planeH=planeW/aspect;
  
  // Main lion plane with custom shader for depth/parallax feel
  const lionMat=new THREE.ShaderMaterial({
    uniforms:{
      map:{value:lionTex},
      time:{value:0},
      mouse:{value:new THREE.Vector2(0,0)}
    },
    vertexShader:`
      varying vec2 vUv;
      varying vec3 vPos;
      uniform float time;
      uniform vec2 mouse;
      void main(){
        vUv=uv;
        vPos=position;
        vec3 p=position;
        // Subtle 3D wave displacement
        float wave=sin(p.x*2.0+time*0.8)*cos(p.y*2.0+time*0.6)*0.03;
        p.z+=wave;
        // Mouse parallax
        p.x+=mouse.x*0.15;
        p.y+=mouse.y*0.1;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
      }
    `,
    fragmentShader:`
      uniform sampler2D map;
      uniform float time;
      uniform vec2 mouse;
      varying vec2 vUv;
      varying vec3 vPos;
      void main(){
        // Slight UV distortion for depth feel
        vec2 uv=vUv;
        uv+=mouse*0.02;
        
        vec4 tex=texture2D(map,uv);
        
        // Edge glow effect
        float edge=1.0-smoothstep(0.3,0.5,length(vUv-0.5));
        
        // Subtle fire tint at edges
        float fireEdge=smoothstep(0.35,0.5,length(vUv-0.5));
        vec3 fireColor=mix(vec3(1.0,0.55,0.0),vec3(1.0,0.2,0.0),fireEdge);
        
        vec3 col=tex.rgb;
        // Add subtle golden glow pulsing
        float pulse=sin(time*1.5)*0.05+0.95;
        col*=pulse;
        
        // Mix fire at transparent edges
        float alpha=tex.a;
        if(alpha<0.1){
          col=fireColor;
          alpha=fireEdge*0.2*sin(time*3.0+vUv.x*10.0)*0.5+0.1;
        }
        
        gl_FragColor=vec4(col,alpha);
      }
    `,
    transparent:true,
    side:THREE.DoubleSide,
    depthWrite:false
  });
  
  const lionPlane=new THREE.Mesh(new THREE.PlaneGeometry(planeW,planeH,32,32),lionMat);
  lionPlane.position.z=0;
  scene.add(lionPlane);
  
  window._lionMat=lionMat;
});

// Fire particle ring around the lion
const fCnt=300;
const fGeo=new THREE.BufferGeometry();
const fPos=new Float32Array(fCnt*3);
const fSz=new Float32Array(fCnt);
const fVel=[];
const fPh=new Float32Array(fCnt);

function resetF(i){
  const a=Math.random()*Math.PI*2;
  const r=1.8+Math.random()*1.2;
  fPos[i*3]=Math.cos(a)*r;
  fPos[i*3+1]=-2+Math.random()*0.5;
  fPos[i*3+2]=(Math.random()-0.5)*1.5;
  fSz[i]=Math.random()*2.5+0.5;
  fVel[i]={x:(Math.random()-0.5)*0.003,y:0.01+Math.random()*0.03,z:(Math.random()-0.5)*0.003};
  fPh[i]=Math.random()*6.28;
}
for(let i=0;i<fCnt;i++)resetF(i);

fGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
fGeo.setAttribute('size',new THREE.BufferAttribute(fSz,1));
fGeo.setAttribute('phase',new THREE.BufferAttribute(fPh,1));

const fMat=new THREE.ShaderMaterial({
  uniforms:{time:{value:0}},
  vertexShader:`
    attribute float size;
    attribute float phase;
    varying float vLife;
    varying float vPhase;
    uniform float time;
    void main(){
      vPhase=phase;
      vLife=clamp(position.y/3.5,0.0,1.0);
      vec3 p=position;
      p.x+=sin(time*0.5+phase)*0.1;
      vec4 mv=modelViewMatrix*vec4(p,1.0);
      gl_PointSize=size*(1.0-vLife)*(120.0/-mv.z);
      gl_Position=projectionMatrix*mv;
    }
  `,
  fragmentShader:`
    varying float vLife;
    varying float vPhase;
    uniform float time;
    void main(){
      float d=length(gl_PointCoord-0.5)*2.0;
      if(d>1.0)discard;
      float flicker=sin(time*4.0+vPhase*10.0)*0.15+0.85;
      float a=(1.0-d)*(1.0-vLife)*0.5*flicker;
      vec3 c=mix(vec3(1.0,0.84,0.0),vec3(1.0,0.15,0.0),vLife);
      c=mix(c,vec3(1.0,1.0,0.9),(1.0-d)*0.2);
      gl_FragColor=vec4(c,a);
    }
  `,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(fGeo,fMat));

// Ember sparks
const eCnt=80;
const eGeo=new THREE.BufferGeometry();
const ePos=new Float32Array(eCnt*3);
const eSz=new Float32Array(eCnt);
const eVel=[];

function resetE(i){
  ePos[i*3]=(Math.random()-0.5)*4;
  ePos[i*3+1]=-2.5+Math.random();
  ePos[i*3+2]=(Math.random()-0.5)*2;
  eSz[i]=Math.random()*1+0.2;
  eVel[i]={x:(Math.random()-0.5)*0.008,y:0.005+Math.random()*0.015,z:(Math.random()-0.5)*0.005};
}
for(let i=0;i<eCnt;i++)resetE(i);
eGeo.setAttribute('position',new THREE.BufferAttribute(ePos,3));
eGeo.setAttribute('size',new THREE.BufferAttribute(eSz,1));

const eMat=new THREE.ShaderMaterial({
  vertexShader:`attribute float size;void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=size*(100.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;gl_FragColor=vec4(1.0,0.7,0.1,(1.0-d)*0.5);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(eGeo,eMat));

// Stars background
const sC=1200;const sGeo=new THREE.BufferGeometry();const sPos=new Float32Array(sC*3);
for(let i=0;i<sC;i++){const r=20+Math.random()*50;const t=Math.random()*6.28;const p=Math.acos(2*Math.random()-1);sPos[i*3]=r*Math.sin(p)*Math.cos(t);sPos[i*3+1]=r*Math.sin(p)*Math.sin(t);sPos[i*3+2]=r*Math.cos(p);}
sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xFFE082,size:0.08,transparent:true,opacity:0.4})));

// Mouse
let mx=0,my=0;
document.addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-0.5)*2;my=(e.clientY/innerHeight-0.5)*2;});

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  
  // Update lion shader
  if(window._lionMat){
    window._lionMat.uniforms.time.value=t;
    window._lionMat.uniforms.mouse.value.set(mx,my);
  }
  
  // Fire update
  fMat.uniforms.time.value=t;
  const fp=fGeo.attributes.position.array;
  for(let i=0;i<fCnt;i++){fp[i*3]+=fVel[i].x;fp[i*3+1]+=fVel[i].y;fp[i*3+2]+=fVel[i].z;if(fp[i*3+1]>3.5)resetF(i);}
  fGeo.attributes.position.needsUpdate=true;
  
  // Embers
  const ep=eGeo.attributes.position.array;
  for(let i=0;i<eCnt;i++){ep[i*3]+=eVel[i].x;ep[i*3+1]+=eVel[i].y;ep[i*3+2]+=eVel[i].z;if(ep[i*3+1]>3)resetE(i);}
  eGeo.attributes.position.needsUpdate=true;
  
  // Camera subtle movement
  camera.position.x+=(mx*0.5-camera.position.x)*0.02;
  camera.position.y+=(-my*0.3-camera.position.y)*0.02;
  camera.lookAt(0,0,0);
  
  composer.render();
}
animate();
</script>
</body>
</html>
