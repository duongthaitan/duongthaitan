<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#1a0e00"/><stop offset="100%" stop-color="#080400"/></radialGradient>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFD700" stop-opacity=".15"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <style>
    @keyframes pg{0%,100%{opacity:.3;r:3}50%{opacity:1;r:4.5}}
    @keyframes pg2{0%,100%{opacity:.5;r:4}50%{opacity:1;r:5.5}}
    @keyframes tw{0%,100%{opacity:.1}50%{opacity:.7}}
    @keyframes dl{0%{stroke-dashoffset:200}100%{stroke-dashoffset:0}}
    @keyframes rt{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes rt2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
    @keyframes gp{0%,100%{opacity:.03}50%{opacity:.08}}
    @keyframes fl{0%{transform:translateY(0);opacity:.5}100%{transform:translateY(-10px);opacity:0}}
    @keyframes sh{0%,100%{fill-opacity:.5}50%{fill-opacity:.9}}
    .cs{animation:pg 2.5s ease-in-out infinite}
    .cs2{animation:pg2 2.5s ease-in-out infinite}
    .bs{animation:tw 4s ease-in-out infinite}
    .cl{stroke-dasharray:200;animation:dl 4s ease-in-out infinite alternate}
    .o1{animation:rt 40s linear infinite;transform-origin:250px 230px}
    .o2{animation:rt2 55s linear infinite;transform-origin:250px 230px}
    .ng{animation:gp 6s ease-in-out infinite}
    .fp{animation:fl 2s ease-out infinite}
    .sh{animation:sh 3s ease-in-out infinite}
  </style>
  
  <rect width="500" height="500" fill="url(#bg)"/>
  
  <!-- Nebula glow behind constellation -->
  <ellipse cx="270" cy="250" rx="130" ry="100" fill="#FF6F00" opacity=".02" class="ng" filter="url(#g3)"/>
  <ellipse cx="230" cy="220" rx="80" ry="60" fill="#FFD700" opacity=".015" class="ng" style="animation-delay:3s" filter="url(#g3)"/>
  
  <!-- Background stars - many for richness -->
  <circle cx="20" cy="30" r="1" fill="#FFF8E1" class="bs" style="animation-delay:0s"/><circle cx="75" cy="65" r=".6" fill="#FFD700" class="bs" style="animation-delay:.5s"/><circle cx="130" cy="25" r=".8" fill="#FFF" class="bs" style="animation-delay:1s"/><circle cx="190" cy="50" r=".5" fill="#FFE082" class="bs" style="animation-delay:1.5s"/><circle cx="310" cy="35" r=".7" fill="#FFF" class="bs" style="animation-delay:.3s"/><circle cx="380" cy="55" r="1" fill="#FFD700" class="bs" style="animation-delay:.8s"/><circle cx="430" cy="25" r=".6" fill="#FFF8E1" class="bs" style="animation-delay:1.3s"/><circle cx="470" cy="70" r=".8" fill="#FFE082" class="bs" style="animation-delay:1.8s"/><circle cx="40" cy="400" r=".7" fill="#FFF" class="bs" style="animation-delay:.2s"/><circle cx="100" cy="440" r="1" fill="#FFD700" class="bs" style="animation-delay:.7s"/><circle cx="200" cy="470" r=".5" fill="#FFF8E1" class="bs" style="animation-delay:1.2s"/><circle cx="350" cy="460" r=".8" fill="#FFE082" class="bs" style="animation-delay:1.7s"/><circle cx="420" cy="420" r=".6" fill="#FFF" class="bs" style="animation-delay:.4s"/><circle cx="460" cy="380" r="1" fill="#FFD700" class="bs" style="animation-delay:.9s"/><circle cx="25" cy="200" r=".7" fill="#FFF8E1" class="bs" style="animation-delay:1.4s"/><circle cx="480" cy="150" r=".5" fill="#FFE082" class="bs" style="animation-delay:1.9s"/><circle cx="15" cy="300" r=".8" fill="#FFF" class="bs" style="animation-delay:.6s"/><circle cx="485" cy="300" r=".6" fill="#FFD700" class="bs" style="animation-delay:1.1s"/>
  
  <!-- Subtle orbit rings -->
  <g class="o1" opacity=".04"><circle cx="250" cy="230" r="180" fill="none" stroke="#FFD700" stroke-width=".4"/></g>
  <g class="o2" opacity=".03"><circle cx="250" cy="230" r="200" fill="none" stroke="#FFA000" stroke-width=".3" stroke-dasharray="5,10"/></g>
  
  <!-- Star glow behind constellation -->
  <circle cx="250" cy="230" r="100" fill="url(#sg)" filter="url(#g3)"/>
  
  <!-- ===== LEO CONSTELLATION STARS ===== -->
  <!-- Regulus (Alpha Leo) - BRIGHTEST -->
  <circle cx="155" cy="335" r="5" fill="#FFD700" class="cs2" filter="url(#g2)" style="animation-delay:0s"/>
  <circle cx="155" cy="335" r="8" fill="#FFD700" opacity=".1" filter="url(#g3)"/>
  <!-- Eta Leonis -->
  <circle cx="160" cy="275" r="3" fill="#FFCA28" class="cs" filter="url(#g1)" style="animation-delay:.3s"/>
  <!-- Algieba (Gamma) -->
  <circle cx="180" cy="230" r="3.5" fill="#FFD54F" class="cs" filter="url(#g1)" style="animation-delay:.6s"/>
  <circle cx="180" cy="230" r="6" fill="#FFD700" opacity=".06" filter="url(#g2)"/>
  <!-- Zeta Leonis -->
  <circle cx="210" cy="185" r="3" fill="#FFCA28" class="cs" filter="url(#g1)" style="animation-delay:.9s"/>
  <!-- Mu Leonis -->
  <circle cx="255" cy="160" r="2.5" fill="#FFE082" class="cs" filter="url(#g1)" style="animation-delay:1.2s"/>
  <!-- Epsilon Leonis -->
  <circle cx="300" cy="175" r="3" fill="#FFD54F" class="cs" filter="url(#g1)" style="animation-delay:1.5s"/>
  <!-- Delta Leonis (Zosma) -->
  <circle cx="320" cy="220" r="3.2" fill="#FFCA28" class="cs" filter="url(#g1)" style="animation-delay:1.8s"/>
  <!-- Theta Leonis (Chertan) -->
  <circle cx="300" cy="285" r="2.8" fill="#FFE082" class="cs" filter="url(#g1)" style="animation-delay:2.1s"/>
  <!-- Denebola (Beta Leo) - 2nd brightest -->
  <circle cx="370" cy="250" r="4.5" fill="#FFD700" class="cs2" filter="url(#g2)" style="animation-delay:2.4s"/>
  <circle cx="370" cy="250" r="7" fill="#FFD700" opacity=".08" filter="url(#g3)"/>
  
  <!-- Constellation lines with draw animation -->
  <line x1="155" y1="335" x2="160" y2="275" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:0s"/>
  <line x1="160" y1="275" x2="180" y2="230" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:.4s"/>
  <line x1="180" y1="230" x2="210" y2="185" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:.8s"/>
  <line x1="210" y1="185" x2="255" y2="160" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:1.2s"/>
  <line x1="255" y1="160" x2="300" y2="175" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:1.6s"/>
  <line x1="300" y1="175" x2="320" y2="220" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:2s"/>
  <line x1="320" y1="220" x2="300" y2="285" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:2.4s"/>
  <line x1="320" y1="220" x2="370" y2="250" stroke="#FFD700" stroke-width=".8" opacity=".25" class="cl" style="animation-delay:2.8s"/>
  
  <!-- Tiny emission particles near bright stars -->
  <circle cx="150" cy="330" r=".8" fill="#FFFDE7" class="fp" style="animation-delay:0s"/><circle cx="160" cy="340" r=".6" fill="#FFD54F" class="fp" style="animation-delay:.5s"/><circle cx="365" cy="245" r=".8" fill="#FFFDE7" class="fp" style="animation-delay:1s"/><circle cx="375" cy="255" r=".6" fill="#FFD54F" class="fp" style="animation-delay:1.5s"/>
  
  <!-- Star labels -->
  <text x="130" y="360" font-family="Georgia,serif" font-size="9" fill="#FFD700" opacity=".45" class="sh">Regulus</text>
  <text x="378" y="248" font-family="Georgia,serif" font-size="9" fill="#FFD700" opacity=".45" class="sh" style="animation-delay:1s">Denebola</text>
  <text x="155" y="225" font-family="Georgia,serif" font-size="8" fill="#FFA000" opacity=".3">Algieba</text>
  
  <!-- Title -->
  <text x="250" y="430" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#FFD700" opacity=".5" letter-spacing="5" class="sh">LEO CONSTELLATION</text>
  <text x="250" y="455" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#FFA000" opacity=".35" letter-spacing="3">♌ THE LION • JULY 23 — AUGUST 22</text>
</svg>
