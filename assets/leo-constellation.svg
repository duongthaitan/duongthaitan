<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.4; r: 3; } 50% { opacity: 1; r: 4; } }
    @keyframes drawLine { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .const-star { animation: pulseGlow 2s ease-in-out infinite; }
    .bg-star { animation: twinkle 3s ease-in-out infinite; }
    .const-line { stroke-dasharray: 100; animation: drawLine 3s ease-in-out infinite alternate; }
    .orbit { animation: rotate 30s linear infinite; transform-origin: 250px 250px; }
  </style>
  
  <rect width="500" height="500" fill="url(#bg)"/>
  
  <!-- Background stars -->
  <circle cx="30" cy="40" r="1" fill="#FFF8DC" class="bg-star" style="animation-delay:0s"/>
  <circle cx="80" cy="90" r="0.8" fill="#FFD700" class="bg-star" style="animation-delay:0.5s"/>
  <circle cx="150" cy="30" r="1.2" fill="#FFF" class="bg-star" style="animation-delay:1s"/>
  <circle cx="420" cy="60" r="1" fill="#FFD700" class="bg-star" style="animation-delay:0.3s"/>
  <circle cx="470" cy="120" r="0.8" fill="#FFF8DC" class="bg-star" style="animation-delay:0.8s"/>
  <circle cx="60" cy="400" r="1" fill="#FFF" class="bg-star" style="animation-delay:1.2s"/>
  <circle cx="440" cy="430" r="1.2" fill="#FFD700" class="bg-star" style="animation-delay:0.2s"/>
  <circle cx="350" cy="470" r="0.8" fill="#FFF8DC" class="bg-star" style="animation-delay:0.7s"/>
  <circle cx="120" cy="460" r="1" fill="#FFD700" class="bg-star" style="animation-delay:1.5s"/>
  <circle cx="400" cy="350" r="0.8" fill="#FFF" class="bg-star" style="animation-delay:0.4s"/>
  <circle cx="50" cy="250" r="1.2" fill="#FFD700" class="bg-star" style="animation-delay:0.9s"/>
  <circle cx="460" cy="250" r="1" fill="#FFF8DC" class="bg-star" style="animation-delay:1.3s"/>
  
  <!-- Subtle orbit ring -->
  <g class="orbit" opacity="0.06">
    <circle cx="250" cy="250" r="200" fill="none" stroke="#FFD700" stroke-width="0.5"/>
  </g>
  
  <!-- Leo Constellation - accurate star positions -->
  <!-- Regulus (Alpha Leo) - brightest -->
  <circle cx="180" cy="340" r="4" fill="#FFD700" class="const-star" filter="url(#bigGlow)" style="animation-delay:0s"/>
  <!-- Eta Leo -->
  <circle cx="175" cy="280" r="2.5" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:0.2s"/>
  <!-- Algieba (Gamma Leo) -->
  <circle cx="195" cy="240" r="3" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:0.4s"/>
  <!-- Zeta Leo -->
  <circle cx="225" cy="195" r="2.5" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:0.6s"/>
  <!-- Mu Leo -->
  <circle cx="270" cy="170" r="2" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:0.8s"/>
  <!-- Epsilon Leo -->
  <circle cx="310" cy="185" r="2.5" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:1s"/>
  <!-- Delta Leo (Zosma) -->
  <circle cx="330" cy="230" r="2.8" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:1.2s"/>
  <!-- Theta Leo (Chertan) -->
  <circle cx="310" cy="290" r="2.5" fill="#FFD700" class="const-star" filter="url(#glow)" style="animation-delay:1.4s"/>
  <!-- Denebola (Beta Leo) -->
  <circle cx="370" cy="260" r="3.5" fill="#FFD700" class="const-star" filter="url(#bigGlow)" style="animation-delay:1.6s"/>
  
  <!-- Constellation lines -->
  <line x1="180" y1="340" x2="175" y2="280" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:0s"/>
  <line x1="175" y1="280" x2="195" y2="240" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:0.3s"/>
  <line x1="195" y1="240" x2="225" y2="195" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:0.6s"/>
  <line x1="225" y1="195" x2="270" y2="170" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:0.9s"/>
  <line x1="270" y1="170" x2="310" y2="185" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:1.2s"/>
  <line x1="310" y1="185" x2="330" y2="230" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:1.5s"/>
  <line x1="330" y1="230" x2="310" y2="290" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:1.8s"/>
  <line x1="330" y1="230" x2="370" y2="260" stroke="#FFD700" stroke-width="0.8" opacity="0.3" class="const-line" style="animation-delay:2.1s"/>
  
  <!-- Labels -->
  <text x="160" y="365" font-family="Georgia,serif" font-size="10" fill="#FFD700" opacity="0.5">Regulus</text>
  <text x="375" y="255" font-family="Georgia,serif" font-size="10" fill="#FFD700" opacity="0.5">Denebola</text>
  
  <!-- Title -->
  <text x="250" y="440" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#FFD700" opacity="0.6" letter-spacing="4">LEO CONSTELLATION</text>
  <text x="250" y="460" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#FFA500" opacity="0.4" letter-spacing="2">♌ THE LION</text>
</svg>
