<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="nameG" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#f0f6fc"/>
      <stop offset="100%" stop-color="#b0b8c1"/>
    </linearGradient>
    <linearGradient id="lineG" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="15%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="85%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
      @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      .cur{animation:blink 1.1s step-end infinite}
      .pul{animation:pulse 2.5s ease-in-out infinite}
      .f1{animation:float1 6s ease-in-out infinite}
      .f2{animation:float2 8s ease-in-out infinite 1s}
    </style>
  </defs>

  <rect width="900" height="280" fill="#0d1117"/>

  <!-- Grid -->
  <g opacity="0.025"><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#c9d1d9" stroke-width="0.5"/></pattern><rect width="900" height="280" fill="url(#g)"/></g>

  <!-- Corner brackets -->
  <g stroke="#21262d" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M28 55L28 28L55 28"/><path d="M872 55L872 28L845 28"/>
    <path d="M28 225L28 252L55 252"/><path d="M872 225L872 252L845 252"/>
  </g>

  <!-- Gradient lines -->
  <rect x="55" y="58" width="790" height="1" rx=".5" fill="url(#lineG)" opacity="0.4" class="pul"/>
  <rect x="55" y="245" width="790" height="1" rx=".5" fill="url(#lineG)" opacity="0.4" class="pul"/>

  <!-- Line numbers -->
  <g font-family="'JetBrains Mono',monospace" font-size="9.5" fill="#21262d" opacity="0.5">
    <text x="58" y="50">01</text><text x="58" y="95">02</text>
    <text x="58" y="143">03</text><text x="58" y="186">04</text><text x="58" y="232">05</text>
  </g>

  <!-- Vertical accent -->
  <rect x="82" y="68" width="2" height="170" rx="1" fill="url(#grad)" opacity="0.4"/>

  <!-- Code greeting -->
  <text x="102" y="95" font-family="'JetBrains Mono',monospace" font-size="12">
    <tspan fill="#0ea5e9">const</tspan><tspan fill="#c9d1d9"> developer</tspan>
    <tspan fill="#6e7681"> = </tspan><tspan fill="#a5d6ff">"</tspan>
  </text>

  <!-- Name -->
  <text x="102" y="140" font-family="'Segoe UI',sans-serif" font-size="46" font-weight="700" fill="url(#nameG)" letter-spacing="-1">Duong Thai Tan</text>
  <text x="545" y="140" font-family="'JetBrains Mono',monospace" font-size="14" fill="#a5d6ff">";</text>

  <!-- Role pills -->
  <g font-family="'JetBrains Mono',monospace" font-size="11.5" font-weight="500">
    <rect x="102" y="156" width="145" height="22" rx="4" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-opacity="0.25" stroke-width="0.5"/>
    <text x="113" y="171" fill="#0ea5e9">Frontend Developer</text>
    <rect x="257" y="156" width="108" height="22" rx="4" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="0.5"/>
    <text x="268" y="171" fill="#8b5cf6">UI/UX Designer</text>
    <rect x="375" y="156" width="77" height="22" rx="4" fill="#ec4899" opacity="0.08" stroke="#ec4899" stroke-opacity="0.25" stroke-width="0.5"/>
    <text x="386" y="171" fill="#ec4899">Vietnam</text>
  </g>

  <!-- Terminal status -->
  <text x="102" y="218" font-family="'JetBrains Mono',monospace" font-size="11.5">
    <tspan fill="#484f58">~/portfolio $</tspan><tspan fill="#b1bac4"> echo $STATUS</tspan>
  </text>
  <text x="330" y="218" font-family="'JetBrains Mono',monospace" font-size="11.5" fill="#3fb950" filter="url(#gl)" class="pul">●</text>
  <text x="345" y="218" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#3fb950" letter-spacing="0.5">open_to_work</text>

  <!-- Cursor -->
  <rect x="453" y="207" width="7" height="14" rx="1" fill="#0ea5e9" class="cur" opacity="0.7"/>

  <!-- Right decorative code -->
  <g font-family="'JetBrains Mono',monospace" font-size="9.5" class="f1">
    <text x="620" y="90" fill="#0ea5e9" opacity="0.12">import { passion } from 'life';</text>
    <text x="636" y="108" fill="#8b5cf6" opacity="0.12">import { design } from 'mind';</text>
    <text x="652" y="126" fill="#ec4899" opacity="0.12">import { code } from 'heart';</text>
  </g>
  <g font-family="'JetBrains Mono',monospace" font-size="9.5" opacity="0.08" class="f2">
    <text x="650" y="168" fill="#6e7681">// Pixel by pixel,</text>
    <text x="650" y="186" fill="#6e7681">// line by line.</text>
  </g>

  <!-- Floating particles -->
  <g opacity="0.15">
    <circle cx="750" cy="75" r="2" fill="#0ea5e9" class="f1"/>
    <circle cx="800" cy="200" r="1.5" fill="#8b5cf6" class="f2"/>
    <circle cx="830" cy="120" r="1" fill="#ec4899" class="f1"/>
    <circle cx="700" cy="220" r="1.5" fill="#0ea5e9" class="f2"/>
    <circle cx="860" cy="170" r="1" fill="#8b5cf6" class="f1"/>
  </g>
</svg>
