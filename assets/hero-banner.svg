<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- Solid background — no gradient -->
  <rect width="900" height="220" fill="#0d1117"/>
  <rect width="900" height="1" y="219" fill="#21262d"/>

  <!-- Dot grid — left -->
  <g fill="#21262d" opacity="0.6">
    <circle cx="56" cy="36" r="0.7"/><circle cx="116" cy="36" r="0.7"/>
    <circle cx="176" cy="36" r="0.7"/><circle cx="236" cy="36" r="0.7"/>
    <circle cx="296" cy="36" r="0.7"/><circle cx="356" cy="36" r="0.7"/>
    <circle cx="56" cy="72" r="0.7"/><circle cx="116" cy="72" r="0.7"/>
    <circle cx="176" cy="72" r="0.7"/><circle cx="236" cy="72" r="0.7"/>
    <circle cx="296" cy="72" r="0.7"/><circle cx="356" cy="72" r="0.7"/>
  </g>

  <!-- Dot grid — right -->
  <g fill="#21262d" opacity="0.6">
    <circle cx="544" cy="148" r="0.7"/><circle cx="604" cy="148" r="0.7"/>
    <circle cx="664" cy="148" r="0.7"/><circle cx="724" cy="148" r="0.7"/>
    <circle cx="784" cy="148" r="0.7"/><circle cx="844" cy="148" r="0.7"/>
    <circle cx="544" cy="184" r="0.7"/><circle cx="604" cy="184" r="0.7"/>
    <circle cx="664" cy="184" r="0.7"/><circle cx="724" cy="184" r="0.7"/>
    <circle cx="784" cy="184" r="0.7"/><circle cx="844" cy="184" r="0.7"/>
  </g>

  <!-- Accent line -->
  <rect x="56" y="46" width="2" height="130" rx="1" fill="#58a6ff" opacity="0.4"/>

  <!-- Greeting -->
  <text x="76" y="76" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="13" fill="#8b949e" letter-spacing="3" font-weight="500">HEY THERE, I'M</text>

  <!-- Name -->
  <text x="76" y="118" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="42" font-weight="700" fill="#e6edf3">Duong Thai Tan</text>

  <!-- Role -->
  <text x="76" y="148" font-family="'Fira Code','JetBrains Mono',monospace" font-size="14">
    <tspan fill="#58a6ff">Frontend Developer</tspan>
    <tspan fill="#30363d"> · </tspan>
    <tspan fill="#8b949e">UI/UX Designer</tspan>
    <tspan fill="#30363d"> · </tspan>
    <tspan fill="#8b949e">Vietnam</tspan>
  </text>

  <!-- Terminal status -->
  <text x="76" y="180" font-family="'Fira Code','JetBrains Mono',monospace" font-size="12">
    <tspan fill="#6e7681">~/tan $</tspan>
    <tspan fill="#8b949e"> open to work</tspan>
    <tspan fill="#3fb950"> ●</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="256" y="169" width="7" height="14" fill="#58a6ff" class="cursor" opacity="0.7"/>
</svg>
