<svg xmlns="http://www.w3.org/2000/svg" width="900" height="250" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="100%" style="stop-color:#161b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <rect width="900" height="250" fill="url(#bg)"/>

  <!-- Minimal grid dots -->
  <g fill="#1e293b" opacity="0.4">
    <circle cx="60" cy="40" r="0.8"/><circle cx="120" cy="40" r="0.8"/><circle cx="180" cy="40" r="0.8"/>
    <circle cx="240" cy="40" r="0.8"/><circle cx="300" cy="40" r="0.8"/><circle cx="360" cy="40" r="0.8"/>
    <circle cx="60" cy="80" r="0.8"/><circle cx="120" cy="80" r="0.8"/><circle cx="180" cy="80" r="0.8"/>
    <circle cx="240" cy="80" r="0.8"/><circle cx="300" cy="80" r="0.8"/><circle cx="360" cy="80" r="0.8"/>
    <circle cx="540" cy="160" r="0.8"/><circle cx="600" cy="160" r="0.8"/><circle cx="660" cy="160" r="0.8"/>
    <circle cx="720" cy="160" r="0.8"/><circle cx="780" cy="160" r="0.8"/><circle cx="840" cy="160" r="0.8"/>
    <circle cx="540" cy="200" r="0.8"/><circle cx="600" cy="200" r="0.8"/><circle cx="660" cy="200" r="0.8"/>
    <circle cx="720" cy="200" r="0.8"/><circle cx="780" cy="200" r="0.8"/><circle cx="840" cy="200" r="0.8"/>
  </g>

  <!-- Left accent line -->
  <rect x="60" y="55" width="2" height="140" rx="1" fill="#3b82f6" opacity="0.6"/>

  <!-- Greeting -->
  <text x="80" y="85" font-family="'Inter','Segoe UI',sans-serif" font-size="15" fill="#64748b" letter-spacing="3">HEY THERE, I'M</text>

  <!-- Name -->
  <text x="80" y="130" font-family="'Inter','Segoe UI',sans-serif" font-size="42" font-weight="800" fill="#e2e8f0">Duong Thai Tan</text>

  <!-- Role -->
  <text x="80" y="160" font-family="'JetBrains Mono','Fira Code',monospace" font-size="15" fill="#64748b">
    <tspan fill="#3b82f6">Frontend Developer</tspan>
    <tspan fill="#334155"> · </tspan>
    <tspan fill="#64748b">UI/UX Designer</tspan>
    <tspan fill="#334155"> · </tspan>
    <tspan fill="#64748b">Vietnam</tspan>
  </text>

  <!-- Status line -->
  <text x="80" y="192" font-family="'JetBrains Mono','Fira Code',monospace" font-size="12" fill="#475569">
    <tspan fill="#475569">~/tan $</tspan>
    <tspan fill="#94a3b8"> open to work</tspan>
    <tspan fill="#22c55e"> ●</tspan>
  </text>

  <!-- Cursor -->
  <rect x="265" y="181" width="7" height="14" fill="#3b82f6" class="cursor" opacity="0.8"/>
</svg>
