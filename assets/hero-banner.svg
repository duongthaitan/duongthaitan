<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f6fc"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
      .cursor{animation:blink 1.1s step-end infinite}
      .status-dot{animation:pulse 2s ease-in-out infinite}
    </style>
  </defs>
  <rect width="900" height="260" fill="#0d1117"/>
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c9d1d9" stroke-width="0.5"/>
    </pattern>
    <rect width="900" height="260" fill="url(#grid)"/>
  </g>
  <g stroke="#21262d" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M30 50L30 30L50 30"/><path d="M870 50L870 30L850 30"/>
    <path d="M30 210L30 230L50 230"/><path d="M870 210L870 230L850 230"/>
  </g>
  <rect x="60" y="55" width="780" height="1.5" rx="1" fill="url(#lineGlow)" opacity="0.3"/>
  <g font-family="'JetBrains Mono',monospace" font-size="10" fill="#21262d" opacity="0.5">
    <text x="60" y="45">01</text><text x="60" y="88">02</text>
    <text x="60" y="135">03</text><text x="60" y="178">04</text><text x="60" y="220">05</text>
  </g>
  <rect x="85" y="65" width="2.5" height="160" rx="1.25" fill="url(#accentGrad)" opacity="0.5"/>
  <text x="105" y="88" font-family="'JetBrains Mono',monospace" font-size="12">
    <tspan fill="#0ea5e9">const</tspan><tspan fill="#8b949e"> developer</tspan>
    <tspan fill="#6e7681"> = </tspan><tspan fill="#a5d6ff">"</tspan>
  </text>
  <text x="105" y="132" font-family="'Segoe UI',sans-serif" font-size="44" font-weight="700" fill="url(#nameGrad)" letter-spacing="-0.5">Duong Thai Tan</text>
  <text x="530" y="132" font-family="'JetBrains Mono',monospace" font-size="14" fill="#a5d6ff">";</text>
  <g font-family="'JetBrains Mono',monospace" font-size="12.5">
    <rect x="105" y="150" width="155" height="24" rx="4" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="117" y="166" fill="#0ea5e9" font-weight="500">Frontend Developer</text>
    <rect x="270" y="150" width="115" height="24" rx="4" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="282" y="166" fill="#8b5cf6" font-weight="500">UI/UX Designer</text>
    <rect x="395" y="150" width="80" height="24" rx="4" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="407" y="166" fill="#ec4899" font-weight="500">Vietnam</text>
  </g>
  <g font-family="'JetBrains Mono',monospace" font-size="12">
    <text x="105" y="210"><tspan fill="#6e7681">~/portfolio $</tspan><tspan fill="#c9d1d9"> status</tspan></text>
    <text x="295" y="210" fill="#3fb950" filter="url(#glow)" class="status-dot">●</text>
    <text x="312" y="210" fill="#3fb950" font-size="11">open to work</text>
  </g>
  <rect x="420" y="199" width="8" height="15" rx="1" fill="#0ea5e9" class="cursor" opacity="0.8"/>
  <g font-family="'JetBrains Mono',monospace" font-size="10" opacity="0.15">
    <text x="640" y="90" fill="#0ea5e9">import { passion } from 'life';</text>
    <text x="660" y="110" fill="#8b5cf6">import { creativity } from 'mind';</text>
    <text x="680" y="130" fill="#ec4899">import { code } from 'heart';</text>
    <text x="660" y="160" fill="#6e7681">// Building the future,</text>
    <text x="660" y="177" fill="#6e7681">// one pixel at a time.</text>
  </g>
  <rect x="60" y="237" width="780" height="1.5" rx="1" fill="url(#lineGlow)" opacity="0.3"/>
  <g fill="#21262d" opacity="0.4">
    <circle cx="820" cy="200" r="1"/><circle cx="835" cy="200" r="1"/><circle cx="850" cy="200" r="1"/>
    <circle cx="820" cy="215" r="1"/><circle cx="835" cy="215" r="1"/><circle cx="850" cy="215" r="1"/>
  </g>
</svg>
