<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="s1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFDE7"/><stop offset="15%" stop-color="#FFD54F"/><stop offset="35%" stop-color="#FF8F00"/><stop offset="55%" stop-color="#E65100"/><stop offset="80%" stop-color="#BF360C" stop-opacity="0.5"/><stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/></radialGradient>
    <radialGradient id="s2" cx="45%" cy="45%" r="50%"><stop offset="0%" stop-color="#FFF9C4"/><stop offset="20%" stop-color="#FFE082"/><stop offset="50%" stop-color="#FFA000"/><stop offset="80%" stop-color="#E65100"/><stop offset="100%" stop-color="#BF360C"/></radialGradient>
    <radialGradient id="s3" cx="55%" cy="40%" r="40%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient>
    <radialGradient id="flare1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0605"/><stop offset="50%" stop-color="#120a04"/><stop offset="100%" stop-color="#0a0605"/></linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#B8860B"/><stop offset="25%" stop-color="#FFD700"/><stop offset="50%" stop-color="#FFFACD"/><stop offset="75%" stop-color="#FFD700"/><stop offset="100%" stop-color="#B8860B"/></linearGradient>
    <filter id="g1"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="g3"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="g4"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="turb"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2"/><feDisplacementMap in="SourceGraphic" scale="8"/></filter>
  </defs>
  <style>
    @keyframes R{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes RR{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
    @keyframes P{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes P2{0%,100%{opacity:.3;transform:scale(.95)}50%{opacity:.7;transform:scale(1.05)}}
    @keyframes T{0%,100%{opacity:.15}50%{opacity:.9}}
    @keyframes TF{0%,100%{opacity:.1}50%{opacity:1}}
    @keyframes F{0%{transform:translateY(0) scale(1);opacity:.8}100%{transform:translateY(-40px) scale(.3);opacity:0}}
    @keyframes F2{0%{transform:translate(0,0) scale(1);opacity:.6}50%{transform:translate(10px,-20px) scale(.7);opacity:.3}100%{transform:translate(20px,-40px) scale(.2);opacity:0}}
    @keyframes FL{0%,100%{opacity:.6}15%{opacity:1}30%{opacity:.7}50%{opacity:.9}70%{opacity:.5}85%{opacity:.8}}
    @keyframes B{0%,100%{r:42}50%{r:44}}
    @keyframes SH{0%{fill-opacity:.7}50%{fill-opacity:1}100%{fill-opacity:.7}}
    @keyframes DR{0%,100%{opacity:.05}50%{opacity:.15}}
    @keyframes SW{0%{transform:translateX(-5px)}50%{transform:translateX(5px)}100%{transform:translateX(-5px)}}
    @keyframes EM{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.3)}}
    .r1{animation:R 25s linear infinite;transform-origin:600px 185px}
    .r2{animation:RR 35s linear infinite;transform-origin:600px 185px}
    .r3{animation:R 45s linear infinite;transform-origin:600px 185px}
    .r4{animation:RR 18s linear infinite;transform-origin:600px 185px}
    .sc{animation:B 5s ease-in-out infinite}
    .sg{animation:P 5s ease-in-out infinite;transform-origin:600px 185px}
    .sg2{animation:P2 7s ease-in-out infinite;transform-origin:600px 185px}
    .fl{animation:FL 3s ease-in-out infinite}
    .fp{animation:F 2.5s ease-out infinite}
    .fp2{animation:F2 3s ease-out infinite}
    .st{animation:T 4s ease-in-out infinite}
    .stf{animation:TF 2s ease-in-out infinite}
    .tt{animation:SH 4s ease-in-out infinite}
    .dr{animation:DR 8s ease-in-out infinite}
    .em{animation:EM 3s ease-in-out infinite}
  </style>
  
  <rect width="1200" height="400" fill="url(#bg1)"/>
  
  <!-- Stars - 3 layers for depth -->
  <circle cx="45" cy="25" r="1.5" fill="#FFE082" class="st" style="animation-delay:0s"/><circle cx="120" cy="55" r=".8" fill="#FFF" class="stf" style="animation-delay:.2s"/><circle cx="95" cy="130" r="1" fill="#FFD54F" class="st" style="animation-delay:.8s"/><circle cx="200" cy="38" r="1.2" fill="#FFF8E1" class="stf" style="animation-delay:.4s"/><circle cx="280" cy="72" r=".7" fill="#FFD700" class="st" style="animation-delay:1.1s"/><circle cx="330" cy="28" r="1.4" fill="#FFF" class="stf" style="animation-delay:.6s"/><circle cx="410" cy="55" r=".9" fill="#FFE082" class="st" style="animation-delay:1.4s"/><circle cx="480" cy="90" r="1.1" fill="#FFF8E1" class="stf" style="animation-delay:.3s"/><circle cx="520" cy="32" r=".6" fill="#FFD700" class="st" style="animation-delay:1.7s"/><circle cx="680" cy="42" r="1.3" fill="#FFF" class="stf" style="animation-delay:.5s"/><circle cx="750" cy="68" r=".8" fill="#FFE082" class="st" style="animation-delay:1s"/><circle cx="820" cy="25" r="1.5" fill="#FFF8E1" class="stf" style="animation-delay:.7s"/><circle cx="890" cy="50" r=".7" fill="#FFD700" class="st" style="animation-delay:1.3s"/><circle cx="960" cy="35" r="1.1" fill="#FFF" class="stf" style="animation-delay:.9s"/><circle cx="1030" cy="75" r=".9" fill="#FFE082" class="st" style="animation-delay:1.6s"/><circle cx="1100" cy="40" r="1.4" fill="#FFF8E1" class="stf" style="animation-delay:.1s"/><circle cx="1160" cy="88" r=".6" fill="#FFD700" class="st" style="animation-delay:1.2s"/>
  <circle cx="70" cy="320" r="1" fill="#FFE082" class="st" style="animation-delay:.35s"/><circle cx="180" cy="350" r=".8" fill="#FFF" class="stf" style="animation-delay:.85s"/><circle cx="350" cy="330" r="1.2" fill="#FFD54F" class="st" style="animation-delay:1.35s"/><circle cx="500" cy="360" r=".7" fill="#FFF8E1" class="stf" style="animation-delay:.55s"/><circle cx="700" cy="345" r="1" fill="#FFD700" class="st" style="animation-delay:1.55s"/><circle cx="850" cy="320" r=".9" fill="#FFF" class="stf" style="animation-delay:.25s"/><circle cx="1000" cy="355" r="1.3" fill="#FFE082" class="st" style="animation-delay:.75s"/><circle cx="1130" cy="335" r=".8" fill="#FFF8E1" class="stf" style="animation-delay:1.05s"/>
  <circle cx="30" cy="190" r=".7" fill="#FFD700" class="st" style="animation-delay:.45s"/><circle cx="1170" cy="200" r=".9" fill="#FFF" class="st" style="animation-delay:.95s"/>
  
  <!-- Nebula dust clouds -->
  <ellipse cx="250" cy="150" rx="120" ry="50" fill="#FF6F00" opacity="0.015" class="dr"/><ellipse cx="950" cy="250" rx="100" ry="60" fill="#FFD700" opacity="0.01" class="dr" style="animation-delay:4s"/>
  
  <!-- Sun outer glow layers -->
  <circle cx="600" cy="185" r="150" fill="url(#flare1)" class="sg2" filter="url(#g4)"/>
  <circle cx="600" cy="185" r="100" fill="url(#s1)" class="sg" filter="url(#g3)"/>
  
  <!-- Corona rotating layers -->
  <g class="r1" opacity=".12"><ellipse cx="600" cy="185" rx="95" ry="80" fill="none" stroke="#FFD700" stroke-width=".6"/><ellipse cx="600" cy="185" rx="85" ry="92" fill="none" stroke="#FFA000" stroke-width=".4"/><ellipse cx="600" cy="185" rx="100" ry="70" fill="none" stroke="#FFE082" stroke-width=".5"/></g>
  <g class="r2" opacity=".08"><ellipse cx="600" cy="185" rx="75" ry="100" fill="none" stroke="#FFD700" stroke-width=".4"/><ellipse cx="600" cy="185" rx="105" ry="65" fill="none" stroke="#FF8F00" stroke-width=".3"/></g>
  <g class="r3" opacity=".06"><ellipse cx="600" cy="185" rx="110" ry="55" fill="none" stroke="#FFCA28" stroke-width=".3"/><ellipse cx="600" cy="185" rx="60" ry="108" fill="none" stroke="#FFD700" stroke-width=".2"/></g>
  
  <!-- Solar prominences (flame tongues) -->
  <g class="r4" opacity=".2"><path d="M600,143 Q610,130 605,118 Q600,125 595,115 Q590,128 600,143" fill="#FF6F00" filter="url(#g1)"/><path d="M642,155 Q658,148 665,138 Q652,145 660,132 Q648,142 642,155" fill="#FFA000" filter="url(#g1)"/><path d="M558,160 Q540,155 535,145 Q545,152 538,140 Q550,148 558,160" fill="#FF8F00" filter="url(#g1)"/><path d="M630,218 Q645,228 648,240 Q638,230 643,242 Q633,232 630,218" fill="#FF6F00" filter="url(#g1)"/><path d="M568,220 Q552,232 548,242 Q555,230 550,245 Q558,234 568,220" fill="#FFA000" filter="url(#g1)"/></g>
  
  <!-- Sun surface -->
  <circle cx="600" cy="185" r="42" fill="url(#s2)" class="sc fl" filter="url(#g1)"/>
  <circle cx="600" cy="185" r="38" fill="url(#s3)" opacity=".5"/>
  
  <!-- Sun surface spots (turbulence-like) -->
  <circle cx="590" cy="178" r="5" fill="#E65100" opacity=".15" class="fl" style="animation-delay:.5s"/><circle cx="612" cy="190" r="4" fill="#BF360C" opacity=".12" class="fl" style="animation-delay:1s"/><circle cx="595" cy="195" r="3" fill="#E65100" opacity=".1" class="fl" style="animation-delay:1.5s"/>
  
  <!-- Fire particles erupting from sun - Layer 1 -->
  <circle cx="575" cy="148" r="2.5" fill="#FFD54F" class="fp" opacity=".7" style="animation-delay:0s"/><circle cx="590" cy="145" r="1.8" fill="#FFA000" class="fp" opacity=".6" style="animation-delay:.3s"/><circle cx="610" cy="146" r="2.2" fill="#FFCA28" class="fp" opacity=".8" style="animation-delay:.6s"/><circle cx="625" cy="150" r="1.5" fill="#FF8F00" class="fp" opacity=".5" style="animation-delay:.9s"/><circle cx="565" cy="155" r="2" fill="#FFD700" class="fp" opacity=".7" style="animation-delay:1.2s"/><circle cx="635" cy="158" r="1.8" fill="#FFA000" class="fp" opacity=".6" style="animation-delay:1.5s"/>
  <!-- Layer 2 -->
  <circle cx="555" cy="175" r="1.5" fill="#FFCA28" class="fp2" opacity=".5" style="animation-delay:.2s"/><circle cx="645" cy="172" r="2" fill="#FFD54F" class="fp2" opacity=".4" style="animation-delay:.7s"/><circle cx="560" cy="200" r="1.8" fill="#FF8F00" class="fp2" opacity=".6" style="animation-delay:1.1s"/><circle cx="640" cy="195" r="1.5" fill="#FFD700" class="fp2" opacity=".5" style="animation-delay:1.4s"/><circle cx="580" cy="225" r="2" fill="#FFA000" class="fp" opacity=".4" style="animation-delay:.4s"/><circle cx="620" cy="222" r="1.8" fill="#FFCA28" class="fp" opacity=".5" style="animation-delay:.8s"/>
  <!-- Layer 3 - tiny sparks -->
  <circle cx="570" cy="140" r="1" fill="#FFFDE7" class="fp" opacity=".9" style="animation-delay:.15s"/><circle cx="605" cy="138" r=".8" fill="#FFF" class="fp" opacity=".7" style="animation-delay:.55s"/><circle cx="630" cy="145" r="1" fill="#FFFDE7" class="fp" opacity=".8" style="animation-delay:.95s"/><circle cx="550" cy="165" r=".7" fill="#FFF" class="fp2" opacity=".6" style="animation-delay:1.35s"/><circle cx="650" cy="168" r=".9" fill="#FFFDE7" class="fp2" opacity=".7" style="animation-delay:1.75s"/>
  
  <!-- Emission glow spots -->
  <circle cx="575" cy="160" r="8" fill="#FFD700" opacity=".06" class="em" style="animation-delay:0s" filter="url(#g2)"/><circle cx="625" cy="165" r="6" fill="#FFA000" opacity=".05" class="em" style="animation-delay:1s" filter="url(#g2)"/><circle cx="590" cy="210" r="7" fill="#FF8F00" opacity=".04" class="em" style="animation-delay:2s" filter="url(#g2)"/>
  
  <!-- Orbit rings with planets -->
  <g class="r1" opacity=".1"><ellipse cx="600" cy="185" rx="160" ry="55" fill="none" stroke="#FFD700" stroke-width=".8" stroke-dasharray="4,8"/></g>
  <g class="r2" opacity=".07"><ellipse cx="600" cy="185" rx="190" ry="70" fill="none" stroke="#FFA000" stroke-width=".6" stroke-dasharray="3,10"/></g>
  
  <!-- Orbiting bodies -->
  <g class="r1"><circle cx="760" cy="185" r="3" fill="#FFD54F" filter="url(#g1)" opacity=".7"/></g>
  <g class="r2"><circle cx="790" cy="185" r="2" fill="#FFA000" filter="url(#g1)" opacity=".5"/></g>
  
  <!-- ♌ Leo symbol -->
  <text x="600" y="192" text-anchor="middle" dominant-baseline="middle" font-size="24" fill="#3E2723" opacity=".5" font-weight="bold">♌</text>
  
  <!-- Title with shimmer -->
  <text x="600" y="285" text-anchor="middle" font-family="Georgia,Times,serif" font-size="54" font-weight="bold" fill="url(#tg)" class="tt" filter="url(#g1)">DUONG THAI TAN</text>
  <text x="600" y="285" text-anchor="middle" font-family="Georgia,Times,serif" font-size="54" font-weight="bold" fill="url(#tg)" class="tt" opacity=".6">DUONG THAI TAN</text>
  
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="Georgia,Times,serif" font-size="14" fill="#FFA000" opacity=".6" letter-spacing="8">♌ LEO  •  FRONTEND DEVELOPER  •  VIETNAM</text>
  
  <!-- Decorative bottom line -->
  <line x1="300" y1="355" x2="550" y2="355" stroke="#FFD700" stroke-width=".4" opacity=".2"/><circle cx="570" cy="355" r="2" fill="#FFD700" opacity=".4" class="stf"/><text x="600" y="359" text-anchor="middle" font-size="10" fill="#FFD700" opacity=".3">☀</text><circle cx="630" cy="355" r="2" fill="#FFD700" opacity=".4" class="stf" style="animation-delay:.5s"/><line x1="650" y1="355" x2="900" y2="355" stroke="#FFD700" stroke-width=".4" opacity=".2"/>
</svg>
