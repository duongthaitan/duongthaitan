<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FF8C00" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FF4500" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFACD"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotateReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes flicker { 0%, 100% { opacity: 0.7; } 25% { opacity: 1; } 50% { opacity: 0.8; } 75% { opacity: 0.95; } }
    @keyframes floatUp { 0% { transform: translateY(0); opacity: 0.8; } 100% { transform: translateY(-30px); opacity: 0; } }
    @keyframes breathe { 0%, 100% { r: 45; } 50% { r: 50; } }
    @keyframes coronaSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes textShimmer { 0% { fill-opacity: 0.8; } 50% { fill-opacity: 1; } 100% { fill-opacity: 0.8; } }
    
    .star { animation: twinkle 3s ease-in-out infinite; }
    .star-fast { animation: twinkle 1.5s ease-in-out infinite; }
    .sun-core { animation: breathe 4s ease-in-out infinite; }
    .sun-glow { animation: pulse 4s ease-in-out infinite; }
    .corona { animation: coronaSpin 20s linear infinite; transform-origin: 600px 200px; }
    .corona-rev { animation: coronaSpin 30s linear infinite reverse; transform-origin: 600px 200px; }
    .fire-particle { animation: floatUp 2s ease-out infinite; }
    .title-text { animation: textShimmer 3s ease-in-out infinite; }
    .orbit-ring { animation: rotateSlow 15s linear infinite; transform-origin: 600px 200px; }
    .orbit-ring-2 { animation: rotateReverse 20s linear infinite; transform-origin: 600px 200px; }
  </style>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="0"/>
  
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="#FFD700" class="star" style="animation-delay: 0s"/>
  <circle cx="150" cy="80" r="1" fill="#FFF8DC" class="star-fast" style="animation-delay: 0.3s"/>
  <circle cx="250" cy="45" r="1.2" fill="#FFD700" class="star" style="animation-delay: 0.7s"/>
  <circle cx="100" cy="120" r="0.8" fill="#FFF" class="star-fast" style="animation-delay: 1s"/>
  <circle cx="350" cy="60" r="1" fill="#FFD700" class="star" style="animation-delay: 0.5s"/>
  <circle cx="450" cy="35" r="1.5" fill="#FFF8DC" class="star-fast" style="animation-delay: 1.2s"/>
  <circle cx="700" cy="50" r="1.2" fill="#FFD700" class="star" style="animation-delay: 0.2s"/>
  <circle cx="800" cy="30" r="1" fill="#FFF" class="star-fast" style="animation-delay: 0.8s"/>
  <circle cx="900" cy="70" r="1.5" fill="#FFD700" class="star" style="animation-delay: 1.5s"/>
  <circle cx="1000" cy="40" r="0.8" fill="#FFF8DC" class="star-fast" style="animation-delay: 0.4s"/>
  <circle cx="1100" cy="85" r="1.2" fill="#FFD700" class="star" style="animation-delay: 0.9s"/>
  <circle cx="1150" cy="45" r="1" fill="#FFF" class="star" style="animation-delay: 1.3s"/>
  <circle cx="180" cy="350" r="1" fill="#FFD700" class="star" style="animation-delay: 0.6s"/>
  <circle cx="400" cy="370" r="1.2" fill="#FFF8DC" class="star-fast" style="animation-delay: 1.1s"/>
  <circle cx="750" cy="360" r="0.8" fill="#FFD700" class="star" style="animation-delay: 0.1s"/>
  <circle cx="1050" cy="340" r="1.5" fill="#FFF" class="star-fast" style="animation-delay: 1.4s"/>
  <circle cx="80" cy="250" r="1" fill="#FFD700" class="star" style="animation-delay: 0.35s"/>
  <circle cx="1120" cy="280" r="1.2" fill="#FFF8DC" class="star" style="animation-delay: 0.95s"/>
  
  <!-- Sun Glow (outer) -->
  <circle cx="600" cy="200" r="120" fill="url(#sunGlow)" class="sun-glow"/>
  
  <!-- Corona rings -->
  <g class="corona" opacity="0.15">
    <ellipse cx="600" cy="200" rx="90" ry="85" fill="none" stroke="#FFD700" stroke-width="0.5"/>
    <ellipse cx="600" cy="200" rx="100" ry="70" fill="none" stroke="#FF8C00" stroke-width="0.5"/>
    <ellipse cx="600" cy="200" rx="80" ry="95" fill="none" stroke="#FFA500" stroke-width="0.5"/>
  </g>
  <g class="corona-rev" opacity="0.1">
    <ellipse cx="600" cy="200" rx="110" ry="75" fill="none" stroke="#FFD700" stroke-width="0.3"/>
    <ellipse cx="600" cy="200" rx="70" ry="105" fill="none" stroke="#FF8C00" stroke-width="0.3"/>
  </g>
  
  <!-- Orbit rings -->
  <g class="orbit-ring" opacity="0.12">
    <ellipse cx="600" cy="200" rx="160" ry="60" fill="none" stroke="#FFD700" stroke-width="0.8"/>
  </g>
  <g class="orbit-ring-2" opacity="0.08">
    <ellipse cx="600" cy="200" rx="180" ry="80" fill="none" stroke="#FF8C00" stroke-width="0.6"/>
  </g>

  <!-- Sun Core -->
  <circle cx="600" cy="200" r="45" fill="url(#sunCore)" class="sun-core" filter="url(#bigGlow)"/>
  
  <!-- Fire particles around sun -->
  <circle cx="570" cy="155" r="2" fill="#FFD700" class="fire-particle" opacity="0.7" style="animation-delay: 0s"/>
  <circle cx="630" cy="160" r="1.5" fill="#FFA500" class="fire-particle" opacity="0.6" style="animation-delay: 0.3s"/>
  <circle cx="555" cy="190" r="1.8" fill="#FF8C00" class="fire-particle" opacity="0.8" style="animation-delay: 0.6s"/>
  <circle cx="645" cy="185" r="2" fill="#FFD700" class="fire-particle" opacity="0.5" style="animation-delay: 0.9s"/>
  <circle cx="580" cy="245" r="1.5" fill="#FF4500" class="fire-particle" opacity="0.7" style="animation-delay: 1.2s"/>
  <circle cx="620" cy="240" r="1.8" fill="#FFA500" class="fire-particle" opacity="0.6" style="animation-delay: 1.5s"/>
  <circle cx="560" cy="220" r="1.2" fill="#FFD700" class="fire-particle" opacity="0.9" style="animation-delay: 0.4s"/>
  <circle cx="640" cy="215" r="2.2" fill="#FF8C00" class="fire-particle" opacity="0.5" style="animation-delay: 0.7s"/>
  
  <!-- Leo Symbol ♌ on the sun -->
  <text x="600" y="195" text-anchor="middle" dominant-baseline="middle" font-size="36" fill="#0a0a0a" font-weight="bold" opacity="0.6">♌</text>
  
  <!-- Title -->
  <text x="600" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="url(#textGold)" class="title-text" filter="url(#glow)">DUONG THAI TAN</text>
  
  <!-- Subtitle -->
  <text x="600" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#FFA500" opacity="0.7" letter-spacing="6">♌ LEO  •  FRONTEND DEVELOPER  •  VIETNAM 🇻🇳</text>
  
  <!-- Decorative lines -->
  <line x1="350" y1="365" x2="500" y2="365" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <circle cx="520" cy="365" r="2" fill="#FFD700" opacity="0.5" class="star"/>
  <line x1="540" y1="365" x2="660" y2="365" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <circle cx="680" cy="365" r="2" fill="#FFD700" opacity="0.5" class="star" style="animation-delay: 0.5s"/>
  <line x1="700" y1="365" x2="850" y2="365" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
</svg>
