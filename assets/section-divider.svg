<svg xmlns="http://www.w3.org/2000/svg" width="900" height="30" viewBox="0 0 900 30">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020617;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#22d3ee;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#818cf8;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#818cf8;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#f472b6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100% { opacity: 0.4; r: 2; } 50% { opacity: 1; r: 3; } }
      .p1 { animation: pulse 2s ease-in-out infinite; }
      .p2 { animation: pulse 2s ease-in-out 0.4s infinite; }
      .p3 { animation: pulse 2s ease-in-out 0.8s infinite; }
      .p4 { animation: pulse 2s ease-in-out 1.2s infinite; }
      .p5 { animation: pulse 2s ease-in-out 1.6s infinite; }
    </style>
  </defs>
  
  <!-- Main gradient line -->
  <rect x="50" y="14" width="800" height="1.5" fill="url(#lineGrad)" filter="url(#glow)" rx="0.75"/>
  
  <!-- Animated dots along the line -->
  <circle cx="250" cy="15" r="2" fill="#22d3ee" class="p1" filter="url(#glow)"/>
  <circle cx="350" cy="15" r="2" fill="#818cf8" class="p2" filter="url(#glow)"/>
  <circle cx="450" cy="15" r="2.5" fill="#a78bfa" class="p3" filter="url(#glow)"/>
  <circle cx="550" cy="15" r="2" fill="#818cf8" class="p4" filter="url(#glow)"/>
  <circle cx="650" cy="15" r="2" fill="#f472b6" class="p5" filter="url(#glow)"/>
  
  <!-- Diamond center -->
  <rect x="446" y="11" width="8" height="8" fill="#a78bfa" transform="rotate(45 450 15)" filter="url(#glow)" opacity="0.8"/>
</svg>
