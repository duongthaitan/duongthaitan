<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <!-- Animated dots -->
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes slideIn { 0%{opacity:0;transform:translateX(-20px)} 100%{opacity:1;transform:translateX(0)} }
      .float { animation: float 4s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .blink { animation: blink 1s step-end infinite; }
      .dot1 { animation: pulse 2s ease-in-out infinite; }
      .dot2 { animation: pulse 2s ease-in-out 0.5s infinite; }
      .dot3 { animation: pulse 2s ease-in-out 1s infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>
  <rect width="900" height="220" fill="url(#grid)"/>
  
  <!-- Floating particles -->
  <circle cx="100" cy="40" r="1.5" fill="#00d4ff" class="dot1"/>
  <circle cx="250" cy="80" r="1" fill="#7c3aed" class="dot2"/>
  <circle cx="400" cy="30" r="1.5" fill="#f472b6" class="dot3"/>
  <circle cx="600" cy="60" r="1" fill="#00d4ff" class="dot1"/>
  <circle cx="750" cy="45" r="1.5" fill="#7c3aed" class="dot2"/>
  <circle cx="850" cy="75" r="1" fill="#f472b6" class="dot3"/>
  <circle cx="50" cy="150" r="1" fill="#06b6d4" class="dot3"/>
  <circle cx="200" cy="180" r="1.5" fill="#8b5cf6" class="dot1"/>
  <circle cx="700" cy="170" r="1" fill="#00d4ff" class="dot2"/>
  <circle cx="820" cy="140" r="1.5" fill="#f472b6" class="dot1"/>
  
  <!-- Terminal window frame -->
  <rect x="60" y="25" width="780" height="170" rx="12" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>
  <rect x="60" y="25" width="780" height="35" rx="12" fill="#161b22"/>
  <rect x="60" y="48" width="780" height="12" fill="#161b22"/>
  
  <!-- Window dots -->
  <circle cx="85" cy="42" r="6" fill="#ff5f57"/>
  <circle cx="107" cy="42" r="6" fill="#febc2e"/>
  <circle cx="129" cy="42" r="6" fill="#28c840"/>
  
  <!-- Tab -->
  <text x="160" y="47" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#8b949e">~/duongthaitan</text>
  
  <!-- Terminal content -->
  <text x="85" y="90" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#7c3aed">$</text>
  <text x="100" y="90" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3"> whoami</text>
  
  <text x="85" y="115" font-family="'SF Mono','Fira Code',monospace" font-size="22" fill="url(#glow1)" filter="url(#neon)" font-weight="bold">Duong Thai Tan</text>
  
  <text x="85" y="143" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#7c3aed">$</text>
  <text x="100" y="143" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#e6edf3"> cat role.txt</text>
  
  <text x="85" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#06b6d4">» Frontend Developer</text>
  <text x="310" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#3b3b4f">|</text>
  <text x="325" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#8b5cf6">» UI/UX Designer</text>
  <text x="520" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#3b3b4f">|</text>
  <text x="535" y="168" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#f472b6">» Creative Coder</text>
  
  <!-- Blinking cursor -->
  <rect x="697" y="155" width="10" height="18" fill="#06b6d4" class="blink"/>
  
  <!-- Bottom glow line -->
  <rect x="60" y="210" width="780" height="2" fill="url(#glow1)" rx="1" opacity="0.6"/>
</svg>
