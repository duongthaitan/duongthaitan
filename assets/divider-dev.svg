<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="35%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#f472b6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="5" width="900" height="2" fill="url(#line)" filter="url(#glow)" rx="1"/>
</svg>
