<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0a0a0a"/><stop offset="15%" stop-color="#BF360C" stop-opacity=".3"/><stop offset="30%" stop-color="#E65100" stop-opacity=".6"/><stop offset="45%" stop-color="#FF8F00" stop-opacity=".8"/><stop offset="50%" stop-color="#FFD700"/><stop offset="55%" stop-color="#FF8F00" stop-opacity=".8"/><stop offset="70%" stop-color="#E65100" stop-opacity=".6"/><stop offset="85%" stop-color="#BF360C" stop-opacity=".3"/><stop offset="100%" stop-color="#0a0a0a"/></linearGradient>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFD700" stop-opacity=".6"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient>
    <filter id="gb"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="gb2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <style>
    @keyframes sp{0%,100%{opacity:.1}50%{opacity:1}}
    @keyframes mv{0%{transform:translateX(-3px)}50%{transform:translateX(3px)}100%{transform:translateX(-3px)}}
    @keyframes fl{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-15px);opacity:0}}
    @keyframes w{0%,100%{d:path("M0,30 Q60,18 120,28 Q180,38 240,25 Q300,12 360,28 Q420,42 480,25 Q540,8 600,30 Q660,50 720,28 Q780,8 840,30 Q900,48 960,25 Q1020,5 1080,28 Q1140,45 1200,30")}50%{d:path("M0,28 Q60,42 120,30 Q180,15 240,32 Q300,48 360,25 Q420,10 480,32 Q540,48 600,28 Q660,10 720,32 Q780,48 840,28 Q900,10 960,32 Q1020,48 1080,25 Q1140,8 1200,28")}}
    .sk{animation:sp 2s ease-in-out infinite}
    .wv{animation:w 5s ease-in-out infinite}
    .ft{animation:fl 2s ease-out infinite}
    .sw{animation:mv 4s ease-in-out infinite}
  </style>
  <rect width="1200" height="60" fill="#0a0605"/>
  
  <!-- Glow center -->
  <ellipse cx="600" cy="30" rx="200" ry="20" fill="url(#gg)" opacity=".15" filter="url(#gb2)"/>
  
  <!-- Fire wave line -->
  <path d="M0,30 Q60,18 120,28 Q180,38 240,25 Q300,12 360,28 Q420,42 480,25 Q540,8 600,30 Q660,50 720,28 Q780,8 840,30 Q900,48 960,25 Q1020,5 1080,28 Q1140,45 1200,30" fill="none" stroke="url(#fg)" stroke-width="1.5" class="wv" filter="url(#gb)"/>
  <path d="M0,30 Q60,18 120,28 Q180,38 240,25 Q300,12 360,28 Q420,42 480,25 Q540,8 600,30 Q660,50 720,28 Q780,8 840,30 Q900,48 960,25 Q1020,5 1080,28 Q1140,45 1200,30" fill="none" stroke="url(#fg)" stroke-width=".5" class="wv" opacity=".5"/>
  
  <!-- Sparks along the line -->
  <circle cx="100" cy="28" r="2" fill="#FF8F00" class="sk" style="animation-delay:0s" filter="url(#gb)"/><circle cx="200" cy="25" r="1.5" fill="#FFD700" class="sk" style="animation-delay:.25s" filter="url(#gb)"/><circle cx="300" cy="22" r="2.5" fill="#FFA000" class="sk" style="animation-delay:.5s" filter="url(#gb)"/><circle cx="400" cy="28" r="1.8" fill="#FFD700" class="sk" style="animation-delay:.75s" filter="url(#gb)"/><circle cx="500" cy="25" r="2" fill="#FF8F00" class="sk" style="animation-delay:1s" filter="url(#gb)"/><circle cx="600" cy="30" r="3" fill="#FFD700" class="sk" style="animation-delay:0s" filter="url(#gb)"/><circle cx="700" cy="28" r="2" fill="#FFA000" class="sk" style="animation-delay:1.25s" filter="url(#gb)"/><circle cx="800" cy="30" r="1.5" fill="#FFD700" class="sk" style="animation-delay:1.5s" filter="url(#gb)"/><circle cx="900" cy="28" r="2.5" fill="#FF8F00" class="sk" style="animation-delay:1.75s" filter="url(#gb)"/><circle cx="1000" cy="25" r="1.8" fill="#FFD700" class="sk" style="animation-delay:.4s" filter="url(#gb)"/><circle cx="1100" cy="28" r="2" fill="#FFA000" class="sk" style="animation-delay:.9s" filter="url(#gb)"/>
  
  <!-- Tiny flame particles rising -->
  <circle cx="300" cy="22" r="1" fill="#FFD54F" class="ft" style="animation-delay:0s"/><circle cx="450" cy="25" r=".8" fill="#FFA000" class="ft" style="animation-delay:.4s"/><circle cx="600" cy="28" r="1.2" fill="#FFCA28" class="ft" style="animation-delay:.8s"/><circle cx="750" cy="25" r=".8" fill="#FFD700" class="ft" style="animation-delay:1.2s"/><circle cx="900" cy="22" r="1" fill="#FF8F00" class="ft" style="animation-delay:1.6s"/>
  
  <!-- Leo symbols floating -->
  <text x="570" y="34" font-size="8" fill="#FFD700" opacity=".25" class="sw">♌</text>
  <text x="625" y="34" font-size="8" fill="#FFD700" opacity=".25" class="sw" style="animation-delay:2s">♌</text>
</svg>
