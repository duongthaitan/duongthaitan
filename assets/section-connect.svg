<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
      .dot { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="900" height="120" fill="url(#bg)" rx="8"/>
  <line x1="100" y1="60" x2="330" y2="60" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <line x1="570" y1="60" x2="800" y2="60" stroke="#f472b6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="60" r="2" fill="#22d3ee" class="dot"/>
  <circle cx="800" cy="60" r="2" fill="#f472b6" class="dot"/>
  <text x="450" y="45" font-size="28" text-anchor="middle" dominant-baseline="middle">🌐</text>
  <text x="450" y="80" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="url(#text)" text-anchor="middle" filter="url(#glow)">Connect With Me</text>
  <text x="450" y="102" font-family="'Fira Code',monospace" font-size="11" fill="#64748b" text-anchor="middle">let's build together</text>
</svg>
